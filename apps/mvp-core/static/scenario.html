<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高速事故处理场景 Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body{margin:0;font-family:"Inter","PingFang SC",sans-serif;background:#f5f7fb}
    header{padding:12px 16px;background:#0f4c81;color:#fff;display:flex;justify-content:space-between;align-items:center}
    .container{display:grid;grid-template-columns:2fr 1fr;gap:12px;padding:12px;height:calc(100vh - 56px);box-sizing:border-box}
    #map{width:100%;height:100%;border-radius:8px}.panel{background:#fff;border-radius:8px;padding:12px;overflow:auto}
    .btn{background:#0f4c81;color:#fff;border:0;border-radius:6px;padding:8px 10px;cursor:pointer;margin-right:8px}
    .asset,.log{border-bottom:1px solid #eee;padding:6px 0;font-size:13px}
  </style>
</head>
<body>
<div id="app">
<header>
  <div>核心高速事故处理场景 Demo</div>
  <div>
    <button class="btn" @click="triggerTask">触发事故任务（Agent）</button>
    <button class="btn" @click="resetScenario">重置</button>
    <a href="/console" style="color:#fff">返回控制台</a>
  </div>
</header>
<div class="container">
  <div id="map"></div>
  <div class="panel">
    <h3>事故态势</h3>
    <div>当前事故：{{ incidentText }}</div>
    <h3>设备状态</h3>
    <div class="asset" v-for="a in assets" :key="a.id"><strong>{{ a.name }}</strong> - {{ a.status }}<br/>{{ a.lat.toFixed(5) }}, {{ a.lng.toFixed(5) }}</div>
    <h3>Agent 指令流</h3>
    <div class="log" v-for="c in commands" :key="c.id">[{{ fmtTs(c.created_at) }}] {{ c.issued_by }} -> {{ c.asset_id }}：{{ c.action }}（{{ c.status }}）</div>
    <div class="log" v-if="!commands.length">暂无指令</div>
    <h3>事件日志</h3>
    <div class="log" v-for="l in logs" :key="l.ts + l.message">[{{ fmtTs(l.ts) }}] {{ l.message }}</div>
  </div>
</div>
</div>
<script type="module" src="/static/scenario-app.js"></script>
</body>
</html>
