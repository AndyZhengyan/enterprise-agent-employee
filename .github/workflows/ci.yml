name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install lint tools
        run: pip install ".[dev]"

      - name: Ruff check
        run: ruff check apps/ common/

      - name: Ruff format check
        run: ruff format --check apps/ common/

      - name: MyPy type check
        run: mypy apps/ common/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=apps --cov=common --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
        if: always()

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "frontend/node_modules"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install backend deps
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Start backend (stub mode)
        env:
          OPS_DB_PATH: data/ops.test.db
          PIAGENT_CLI_STUB: "true"
        run: |
          .venv/bin/uvicorn apps.ops.main:app --port 8002 &
          sleep 3

      - name: Build & serve frontend
        run: |
          cd frontend && npm run build
          npx serve dist -l 5173 &
          sleep 2

      - name: Run E2E tests
        run: |
          cd frontend
          npx playwright test --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pip-audit
        run: pip install "pip-audit>=0.1.0"

      - name: pip-audit
        run: pip-audit .
