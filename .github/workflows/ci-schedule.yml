name: Security Audit (Scheduled)

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  security-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install "pip-audit>=0.1.0"

      - name: pip-audit (SPDX)
        run: pip-audit . --format=spdx
